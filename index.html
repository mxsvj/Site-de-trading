<!DOCTYPE html>
<html lang="fr" style="scrollbar-gutter:stable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux — Apprends à lire le marché</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Onest:wght@400;500;600;700&family=Sora:wght@700;800&family=Outfit:wght@800&family=Martian+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050404;
    --panel:#13100d;
    --panel-2:#1a1510;
    --line:#2c2620;
    --gold:#FF6B1A;
    --gold-bright:#FF9D4D;
    --bull:#FFFFFF;
    --bear:#777777;
    /* Couleurs réservées aux graphiques (haussier/baissier) */
    --chart-bull:#34D399;
    --chart-bull-rgb:52,211,153;
    --chart-bear:#F87171;
    --chart-bear-rgb:248,113,113;
    --text:#F5F1EC;
    --muted:#A89F95;
    --muted-2:#6b6258;
    /* Accent orange Cryptox */
    --accent:#FF6B1A;
    --accent-rgb:255,107,26;
    --accent-2:#FF8C2B;
    --accent-2-rgb:255,140,43;
    --ember:#C2410C;
    --display:"Unbounded",system-ui,sans-serif;
    --body:"Onest",system-ui,sans-serif;
    --mono:"Martian Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(900px 500px at 85% -5%, rgba(255,255,255,.05), transparent 60%),
      radial-gradient(700px 600px at -5% 100%, rgba(255,255,255,.03), transparent 55%);
  }
  ::selection{background:rgba(255,255,255,.25)}

  /* ---------- Layout ---------- */
  .app{display:block;min-height:100vh;position:relative;z-index:1}
  .topbrand{position:fixed;top:18px;left:26px;z-index:60}
  .topbrand img{height:40px;width:auto;display:block;cursor:pointer;transition:opacity .2s}
  .topbrand img:hover{opacity:.7}
  .topprogress{position:fixed;top:0;left:0;right:0;height:3px;background:var(--panel-2);z-index:55}
  .topprogress .progress-fill{height:100%;border-radius:0}

  /* ---------- Sidebar ---------- */
  .sidebar{
    border-right:1px solid var(--line);
    background:linear-gradient(180deg,rgba(14,14,14,.6),rgba(0,0,0,.6));
    backdrop-filter:blur(8px);
    padding:28px 0;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{padding:0 26px 22px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .brand .logo{display:flex;align-items:center;gap:11px}
  .brand .mark{height:42px;width:auto;flex-shrink:0;display:block}
  .brand .mark img{display:block;height:100%;width:auto}
  .brand h1{font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:2.4px;text-transform:uppercase;margin-top:3px}

  .progress-wrap{padding:0 26px 20px}
  .progress-label{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--muted);margin-bottom:8px}
  .progress-label b{color:var(--gold-bright);font-family:var(--mono);font-size:13px}
  .progress-track{height:5px;background:var(--panel-2);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2));box-shadow:0 0 8px rgba(var(--accent-rgb),.5);transition:width .6s cubic-bezier(.4,0,.2,1)}

  .nav{padding:6px 14px;display:flex;flex-direction:column;gap:2px}
  .nav-item{
    display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:11px;
    cursor:pointer;border:1px solid transparent;transition:background .18s,border-color .18s;
    text-align:left;background:none;color:inherit;font:inherit;width:100%;
  }
  .nav-item:hover:not(.locked){background:var(--panel)}
  .nav-item.active{background:var(--panel-2);border-color:var(--line)}
  .nav-item.locked{cursor:not-allowed;opacity:.42}
  .nav-item:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .ni-num{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;
    font-family:var(--mono);font-size:13px;font-weight:500;
    background:var(--panel-2);border:1px solid var(--line);color:var(--muted);
    transition:all .2s;
  }
  .nav-item.active .ni-num{border-color:var(--gold);color:var(--gold-bright)}
  .ni-num.done{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#0A0B0F;border-color:transparent}
  .ni-body{min-width:0;flex:1}
  .ni-title{font-size:13.5px;font-weight:500;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ni-meta{font-size:11px;color:var(--muted-2);margin-top:1px}
  .ni-lock{margin-left:auto;color:var(--muted-2);font-size:13px}

  /* ---------- Main ---------- */
  .main{padding:0;min-width:0}
  .topbar{
    position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:16px 44px;border-bottom:1px solid var(--line);
    background:rgba(10,11,15,.72);backdrop-filter:blur(14px);
  }
  .crumb{font-size:12px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  .crumb b{color:var(--gold-bright);font-weight:500}
  .topbar .streak{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .topbar .streak span{color:var(--bull)}

  .content{max-width:820px;margin:0 auto;padding:74px 44px 120px;position:relative}

  .eyebrow{
    display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;
    letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:18px;
  }
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
  .learn-toggle{display:inline-flex;background:linear-gradient(180deg,#13100d,#0d0a08);border:1px solid rgba(var(--accent-rgb),.2);border-radius:14px;padding:5px;gap:5px;margin-bottom:26px}
  .learn-toggle button{font-family:var(--mono);font-size:12.5px;letter-spacing:.5px;padding:10px 20px;border:0;border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;transition:.18s;display:flex;align-items:center;gap:8px}
  .learn-toggle button svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
  .learn-toggle button:hover{color:var(--text)}
  .learn-toggle button.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0604;font-weight:600}
  .lesson-title{font-family:var(--display);font-size:clamp(22px,3vw,30px);font-weight:700;line-height:1.15;letter-spacing:-.5px;margin-bottom:18px}
  .lesson-lede{font-size:18px;color:#C6C9D2;font-weight:400;margin-bottom:14px;max-width:680px}

  .content h2{font-family:var(--display);font-size:22px;font-weight:700;margin:48px 0 14px;letter-spacing:-.6px;line-height:1.2}
  .content h3{font-size:16px;font-weight:600;color:var(--gold-bright);margin:30px 0 8px;letter-spacing:.2px}
  .content p{color:#C2C6D0;margin-bottom:15px;font-size:15.5px}
  .content p strong, .content li strong{color:var(--text);font-weight:600}
  .content em{color:var(--gold-bright);font-style:normal;font-weight:500}
  .content ul{margin:0 0 16px 2px;list-style:none;display:flex;flex-direction:column;gap:9px}
  .content ul li{position:relative;padding-left:22px;color:#C2C6D0;font-size:15px}
  .content ul li::before{content:"";position:absolute;left:2px;top:10px;width:6px;height:6px;border-radius:2px;background:var(--gold);transform:rotate(45deg)}

  .callout{
    border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;
    background:linear-gradient(90deg,rgba(255,255,255,.05),transparent);
    padding:16px 20px;margin:24px 0;font-size:14.5px;color:#CDD0D9;
  }
  .callout b{color:var(--gold-bright);display:block;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}

  /* Chart figure */
  .figure{margin:30px 0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(180deg,var(--panel),#080604)}
  .figure svg{display:block;width:100%;height:auto;background:
    linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px) 0 0/100% 40px,
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px) 0 0/56px 100%;}
  .figure .cap{padding:12px 18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:8px}
  .figure .cap b{color:var(--gold-bright);font-weight:500}

  /* Key takeaways */
  .takeaways{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:24px 26px;margin:40px 0 8px}
  .takeaways .th{font-family:var(--mono);font-size:11.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  .takeaways ul{margin:0;gap:11px}

  /* ---------- Quiz ---------- */
  .quiz{margin-top:60px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,var(--panel-2),var(--panel));overflow:hidden;scroll-margin-top:90px}
  .quiz-head{padding:26px 30px 22px;border-bottom:1px solid var(--line)}
  .quiz-head .qe{font-family:var(--mono);font-size:11.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
  .quiz-head h2{font-family:var(--display);font-size:20px;font-weight:700;margin:0;letter-spacing:-.5px}
  .quiz-head p{font-size:13.5px;color:var(--muted);margin:6px 0 0}
  .quiz-body{padding:14px 30px 30px}

  .q{padding:24px 0;border-bottom:1px solid var(--line)}
  .q:last-of-type{border-bottom:none}
  .q-text{font-size:16px;font-weight:500;margin-bottom:16px;display:flex;gap:12px}
  .q-text .qn{font-family:var(--mono);color:var(--gold);font-size:14px;flex-shrink:0}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{
    display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--line);
    border-radius:12px;cursor:pointer;background:var(--bg);transition:border-color .15s,background .15s;
    font-size:14.5px;color:#CDD0D9;text-align:left;width:100%;font-family:inherit;
  }
  .opt:hover:not(:disabled){border-color:var(--muted-2)}
  .opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .opt .dot{width:19px;height:19px;border-radius:50%;border:2px solid var(--muted-2);flex-shrink:0;transition:all .15s;position:relative}
  .opt.selected{border-color:var(--gold)}
  .opt.selected .dot{border-color:var(--gold)}
  .opt.selected .dot::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--gold)}
  .opt.correct{border-color:var(--bull);background:rgba(255,255,255,.07)}
  .opt.correct .dot{border-color:var(--bull)}
  .opt.correct .dot::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:var(--bull);font-size:12px;font-weight:700}
  .opt.wrong{border-color:var(--bear);background:rgba(120,120,120,.14)}
  .opt.wrong .dot{border-color:var(--bear)}
  .opt.wrong .dot::after{content:"✕";position:absolute;inset:0;display:grid;place-items:center;color:var(--bear);font-size:11px;font-weight:700}
  .opt:disabled{cursor:default}
  .explain{margin-top:12px;font-size:13.5px;color:var(--muted);padding:11px 15px;border-radius:10px;background:var(--bg);border:1px solid var(--line);display:none}
  .explain.show{display:block}
  .explain b{color:var(--gold-bright)}

  .quiz-foot{padding:22px 30px 28px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .btn{
    font-family:var(--body);font-size:14px;font-weight:600;padding:13px 26px;border-radius:11px;
    cursor:pointer;border:1px solid transparent;transition:transform .12s,box-shadow .2s,opacity .2s;letter-spacing:.2px;
  }
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 10px 28px -8px rgba(var(--accent-rgb),.55)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .btn-ghost{background:var(--panel-2);color:var(--text);border-color:var(--line)}
  .result{font-size:14px;font-family:var(--mono);display:flex;align-items:center;gap:12px}
  .result .score{font-size:22px;font-weight:700}
  .result.pass .score{color:var(--bull)}
  .result.fail .score{color:var(--bear)}
  .result .tag{font-size:12px;padding:4px 11px;border-radius:99px;border:1px solid var(--line)}
  .result.pass .tag{color:var(--bull);border-color:rgba(255,255,255,.4)}
  .result.fail .tag{color:var(--bear);border-color:rgba(120,120,120,.4)}

  /* ---------- Indicator selector ---------- */
  .indic-sel{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 26px}
  .indic-sel button{font-family:var(--mono);font-size:12px;letter-spacing:.3px;padding:9px 15px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:8px}
  .indic-sel button .si-ic{width:15px;height:15px;display:grid;place-items:center}
  .indic-sel button .si-ic svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
  .indic-sel button:hover{border-color:var(--muted-2);color:var(--text)}
  .indic-sel button.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0a0a;font-weight:600;border-color:transparent;box-shadow:0 0 14px rgba(var(--accent-rgb),.35)}
  .indic-count{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-left:auto;align-self:center}

  /* ---------- Lesson stepper ---------- */
  .lstepper{display:flex;gap:7px;margin:22px 0 4px}
  .lstep-dot{flex:1;height:4px;border-radius:99px;background:var(--panel-2);overflow:hidden;cursor:pointer;position:relative}
  .lstep-dot .fill{position:absolute;inset:0;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .45s cubic-bezier(.4,0,.2,1)}
  .lstep-dot.done .fill,.lstep-dot.active .fill{width:100%}
  .lstep-lbl{font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:1px;margin:10px 0 24px}
  .lstage{display:none;animation:lfade .4s ease}
  .lstage.active{display:block}
  @keyframes lfade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .lstage .s-kicker{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  .lstage .s-h{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:20px;line-height:1.15}
  /* video block (hidden until id provided) */
  .lvideo{margin-top:22px}
  .lvideo .vlbl{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .lvideo .vlbl::before{content:"";width:6px;height:6px;border-radius:99px;background:var(--bear);box-shadow:0 0 7px var(--bear)}
  .lvideo .frame{position:relative;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#000;aspect-ratio:16/9}
  .lvideo .frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
  .lpager{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:22px;border-top:1px solid var(--line)}
  .lpager .pcount{font-family:var(--mono);font-size:12px;color:var(--muted)}

  /* Lesson nav buttons */
  .lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:46px;gap:14px;flex-wrap:wrap}
  .next-cta{display:flex;align-items:center;gap:10px}

  /* Welcome / completion overlays handled inline */
  .hero{text-align:center;padding:40px 0 10px}
  .hero-logo{display:inline-flex;align-items:center;gap:15px;margin-bottom:30px}
  .hero-logo .lm{height:90px}
  .hero-logo .lm img{display:block;height:100%;width:auto}
  .hero-logo .lw{text-align:left}
  .hero-logo .lw .w1{font-family:var(--display);font-size:26px;font-weight:800;letter-spacing:-1px;line-height:.95}
  .hero-logo .lw .w2{font-family:var(--mono);font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-top:5px}
  .hero .badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid var(--line);padding:7px 15px;border-radius:99px;margin-bottom:26px}
  .hero h1{font-family:var(--display);font-size:clamp(24px,4.4vw,37px);font-weight:700;line-height:1.1;letter-spacing:-1.5px;margin-bottom:20px}
  .hero h1 em{font-style:normal;color:var(--gold-bright)}
  .hero .lede{font-size:18px;color:#C6C9D2;max-width:560px;margin:0 auto 34px}
  .modgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin:40px 0;text-align:left}
  .modcard{border:1px solid var(--line);border-radius:14px;padding:18px;background:var(--panel);transition:border-color .2s,transform .2s}
  .modcard:hover{border-color:var(--muted-2);transform:translateY(-2px)}
  .modcard .mc-n{font-family:var(--mono);font-size:12px;color:var(--gold);margin-bottom:10px}
  .modcard h3{font-family:var(--display);font-size:18px;font-weight:600;margin-bottom:6px;color:var(--text)}
  .modcard p{font-size:13px;color:var(--muted);margin:0}

  .cert{text-align:center;padding:30px 0}
  .cert .seal{width:120px;height:120px;margin:0 auto 28px;border-radius:50%;background:radial-gradient(circle at 50% 38%,rgba(255,255,255,.16),transparent 70%);display:grid;place-items:center;border:2px solid var(--gold);box-shadow:0 0 60px -10px rgba(255,255,255,.22)}
  .cert .seal span{font-family:var(--display);font-size:46px;color:var(--gold-bright)}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;z-index:50;width:300px;transform:translateX(-100%);transition:transform .3s;box-shadow:0 0 60px rgba(0,0,0,.6)}
    .sidebar.open{transform:translateX(0)}
    .content{padding:74px 22px 100px}
    .topbar{padding:14px 20px}
    .menu-btn{display:grid !important}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40}
    .scrim.show{display:block}
  }
  .menu-btn{display:none;position:fixed;top:16px;left:16px;z-index:60;width:42px;height:42px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);place-items:center;cursor:pointer;color:var(--text);font-size:17px}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}

  /* Hero géométrique animé (accueil) */
  .geo-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;-webkit-mask-image:radial-gradient(ellipse 60% 55% at 50% 52%,transparent 0%,transparent 38%,#000 78%);mask-image:radial-gradient(ellipse 60% 55% at 50% 52%,transparent 0%,transparent 38%,#000 78%)}
  .geo-bg .glow{position:absolute;inset:0;background:radial-gradient(60% 50% at 50% 38%,rgba(255,255,255,.05),transparent 70%)}
  .geo-bg .veil{position:absolute;inset:0;background:linear-gradient(to top,var(--bg),transparent 28%,transparent 72%,rgba(0,0,0,.65))}
  .shape{position:absolute;animation:shapeIn 2.4s cubic-bezier(.23,.86,.39,.96) both}
  .shape .inr{animation:shapeFloat 12s ease-in-out infinite}
  .shape .fill{width:100%;height:100%;border-radius:999px;background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,0));border:1px solid rgba(255,255,255,.045);backdrop-filter:blur(2px);box-shadow:0 8px 32px rgba(255,255,255,.02),inset 0 0 40px rgba(255,255,255,.015)}
  @keyframes shapeIn{0%{opacity:0;transform:translateY(-120px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes shapeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(15px)}}
  .hero.geo{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center}
  .hero.geo .hero-logo{margin-bottom:26px}
  .hero.geo .lm{height:62px}
  .fade-up{opacity:0;transform:translateY(28px);animation:fadeUp 1s cubic-bezier(.25,.4,.25,1) forwards}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion:reduce){.fade-up{opacity:1 !important;transform:none !important}}

  /* Navigation flottante (expandable tabs) */

  .etab::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:12px;transform:scale(0);transition:transform .3s cubic-bezier(.2,.7,.2,1);z-index:0;box-shadow:0 4px 16px -4px rgba(var(--accent-rgb),.6)}

  .etab:hover:not(.locked){color:#fff}
  .etab:hover:not(.locked)::before{transform:scale(1)}
  .etab.active{color:#fff}
  .etab.active::before{transform:scale(1)}
  .etab:active:not(.locked)::before{transform:scale(.85)}
  .etab.active .lbl,.etab:hover:not(.locked) .lbl{max-width:150px;opacity:1;margin-left:8px}

<script>
/* ============================================================
   FLUX — données du parcours
   ============================================================ */

// Petit moteur de rendu de graphiques en chandeliers (SVG)
function chart(cfg, reveal){
  var R=reveal||null;
  const W=760, H=300, padX=24, padTop=24, padBot=24;
  const candles=cfg.candles;
  const n=candles.length;
  let prices=[];
  candles.forEach(c=>{prices.push(c.h,c.l)});
  (cfg.lines||[]).forEach(l=>prices.push(l.price));
  (cfg.zones||[]).forEach(z=>prices.push(z.from,z.to));
  (cfg.curves||[]).forEach(cu=>(cu.pts||[]).forEach(pt=>prices.push(pt.p)));
  const min=Math.min(...prices), max=Math.max(...prices);
  const range=(max-min)||1;
  const plotH=H-padTop-padBot;
  const plotW=W-padX*2;
  const step=plotW/n;
  const cw=Math.min(step*0.56,22);
  const Y=p=>padTop+plotH-((p-min)/range)*plotH;
  const X=i=>padX+step*i+step/2;
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${cfg.alt||'graphique'}">`;

  // zones
  (cfg.zones||[]).forEach((z,zi)=>{
    if(R&&(R.z||[]).indexOf(zi)<0)return;
    const y1=Y(Math.max(z.from,z.to)), y2=Y(Math.min(z.from,z.to));
    const col=z.type==='bull'?'52,211,153':z.type==='bear'?'248,113,113':'255,255,255';
    const x0=z.x0!=null?X(z.x0)-cw:padX;
    const x1=z.x1!=null?X(z.x1)+cw:W-padX;
    s+=`<rect x="${x0}" y="${y1}" width="${x1-x0}" height="${y2-y1}" fill="rgba(${col},.13)" stroke="rgba(${col},.5)" stroke-dasharray="4 3" rx="3"/>`;
    if(z.label) s+=`<text x="${x0+8}" y="${y1+16}" fill="rgba(${col},1)" font-family="Martian Mono,monospace" font-size="9.5" font-weight="500">${z.label}</text>`;
  });

  // lines
  (cfg.lines||[]).forEach((l,li)=>{
    if(R&&(R.l||[]).indexOf(li)<0)return;
    const y=Y(l.price);
    const col=l.color==='bull'?'#34D399':l.color==='bear'?'#F87171':l.color==='gold'?'#FFFFFF':'#9A9A9A';
    const x0=l.x0!=null?X(l.x0):padX;
    const x1=l.x1!=null?X(l.x1):W-padX;
    s+=`<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="${col}" stroke-width="1.4" stroke-dasharray="${l.dashed?'6 4':'0'}" opacity=".9"/>`;
    if(l.label) s+=`<text x="${x1-4}" y="${y-6}" text-anchor="end" fill="${col}" font-family="Martian Mono,monospace" font-size="9.5" font-weight="500">${l.label}</text>`;
  });

  // curves (EMA / VWAP ...)
  (cfg.curves||[]).forEach((cu,ci)=>{
    if(R&&R.cu&&R.cu.indexOf(ci)<0)return;
    const col=cu.color==='bear'?'#F87171':cu.color==='bull'?'#34D399':'#FFFFFF';
    let cpts=(cu.pts||[]); if(R)cpts=cpts.filter(pt=>pt.i<R.c); if(cpts.length<2)return;
    const pts=cpts.map(pt=>`${X(pt.i)},${Y(pt.p)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.7" stroke-dasharray="${cu.dashed?'5 4':'0'}" opacity=".95" stroke-linejoin="round" stroke-linecap="round"/>`;
    if(cu.label){const last=cpts[cpts.length-1]; s+=`<text x="${X(last.i)-2}" y="${Y(last.p)-6}" text-anchor="end" fill="${col}" font-family="Martian Mono,monospace" font-size="9" font-weight="500">${cu.label}</text>`;}
  });

  // markers (arrows/labels on candles)
  (cfg.markers||[]).forEach((m,mi)=>{
    if(R&&(R.m||[]).indexOf(mi)<0)return;
    if(R&&m.i>=R.c)return;
    const x=X(m.i);
    const c=candles[m.i];
    const col=m.color==='bull'?'#34D399':m.color==='bear'?'#F87171':'#FFFFFF';
    if(m.dir==='up'){const y=Y(c.l)+18;s+=`<text x="${x}" y="${y}" text-anchor="middle" fill="${col}" font-size="13" font-weight="700">▲</text>`}
    if(m.dir==='down'){const y=Y(c.h)-8;s+=`<text x="${x}" y="${y}" text-anchor="middle" fill="${col}" font-size="13" font-weight="700">▼</text>`}
    if(m.label){const y=m.below?Y(c.l)+30:Y(c.h)-22;s+=`<text x="${x}" y="${y}" text-anchor="middle" fill="${col}" font-family="Martian Mono,monospace" font-size="9" font-weight="600">${m.label}</text>`}
  });

  // candles
  (R?candles.slice(0,R.c):candles).forEach((c,i)=>{
    const x=X(i);
    const up=c.c>=c.o;
    const col=up?'#34D399':'#F87171';
    const yo=Y(c.o), yc=Y(c.c), yh=Y(c.h), yl=Y(c.l);
    const top=Math.min(yo,yc), bh=Math.max(Math.abs(yo-yc),1.5);
    s+=`<line x1="${x}" y1="${yh}" x2="${x}" y2="${yl}" stroke="${col}" stroke-width="1.6"/>`;
    s+=`<rect x="${x-cw/2}" y="${top}" width="${cw}" height="${bh}" fill="${up?'rgba(52,211,153,.85)':'rgba(248,113,113,.82)'}" stroke="${col}" stroke-width="1" rx="1.5"/>`;
  });
  s+=`</svg>`;
  return s;
}

var __VCQ=[];
function vchart(cfg,steps){
  var id='vc'+Math.random().toString(36).slice(2,9);
  __VCQ.push({id:id,cfg:cfg,steps:steps});
  var dots=steps.map(function(_,k){return '<button class="vc-dot" data-k="'+k+'" aria-label="etape '+(k+1)+'"></button>';}).join('');
  return '<div class="vchart" id="'+id+'"><div class="vc-stage"></div><div class="vc-cap"></div>'+
    '<div class="vc-ctrl"><button class="vc-btn vc-replay" title="Revoir">&#8635;</button>'+
    '<button class="vc-btn vc-play" title="Lecture / Pause">&#9654;</button>'+
    '<div class="vc-dots">'+dots+'</div><span class="vc-step"></span><button class="vc-btn vc-speed" title="Vitesse de lecture">1&#215;</button></div></div>';
}
function bootVCharts(){
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  __VCQ.forEach(function(it){
    var root=document.getElementById(it.id); if(!root)return;
    var stage=root.querySelector('.vc-stage'),cap=root.querySelector('.vc-cap'),
        playBtn=root.querySelector('.vc-play'),replayBtn=root.querySelector('.vc-replay'),
        dots=[].slice.call(root.querySelectorAll('.vc-dot')),stepLbl=root.querySelector('.vc-step');
    var k=0,n=it.steps.length,playing=false,timer=null,finished=false;
    var speeds=[1,1.5,2,0.5],si=0,speed=1;
    var speedBtn=root.querySelector('.vc-speed');
    function draw(){
      var st=it.steps[k];
      stage.style.opacity='0';
      stage.innerHTML=chart(it.cfg,st.reveal);
      requestAnimationFrame(function(){stage.style.opacity='1';});
      cap.innerHTML='<b>'+(k+1)+'.</b> '+st.t;
      dots.forEach(function(d,di){d.classList.toggle('on',di<=k);});
      stepLbl.textContent=(k+1)+' / '+n;
    }
    function stop(){playing=false;playBtn.innerHTML='&#9654;';clearTimeout(timer);}
    function go(){playing=true;playBtn.innerHTML='&#10073;&#10073;';schedule();}
    function schedule(){clearTimeout(timer);timer=setTimeout(function(){
      if(!playing)return;
      if(k<n-1){k++;draw();schedule();}else{finished=true;stop();}
    },Math.round(2100/speed));}
    playBtn.addEventListener('click',function(){ if(playing){stop();}else{ if(k>=n-1){k=0;finished=false;draw();} go(); } });
    replayBtn.addEventListener('click',function(){k=0;finished=false;draw();go();});
    dots.forEach(function(d){d.addEventListener('click',function(){k=+d.dataset.k;draw();stop();});});
    if(speedBtn)speedBtn.addEventListener('click',function(){si=(si+1)%speeds.length;speed=speeds[si];speedBtn.textContent=(speed+'').replace('.',',')+'\u00D7';if(playing)schedule();});
    draw();
    if(!reduce&&'IntersectionObserver' in window){
      var io=new IntersectionObserver(function(es){es.forEach(function(e){
        if(e.isIntersecting){ if(!finished&&!playing)go(); } else { if(playing)stop(); }
      });},{threshold:0.5});
      io.observe(root);
    }
  });
  __VCQ=[];
}

const LESSONS=[{"id": "sr", "short": "Supports & Résistances", "meta": "Les bases", "title": "Supports & Résistances", "lede": "La toute première brique : savoir où le prix risque de réagir.", "quiz": {"pass": 75, "questions": [{"q": "Une résistance est une zone où...", "opts": ["les acheteurs reprennent le contrôle", "les vendeurs reprennent le contrôle et freinent la hausse", "le prix accélère toujours", "il n'y a aucun ordre"], "correct": 1, "explain": "En résistance, les vendeurs reprennent la main et stoppent la hausse."}, {"q": "Un support est une zone où...", "opts": ["les vendeurs dominent", "les acheteurs reprennent le contrôle et soutiennent le prix", "le prix casse toujours", "il n'y a pas de volume"], "correct": 1, "explain": "En support, les acheteurs reprennent la main et stoppent la baisse."}, {"q": "Quand une résistance est clairement cassée, elle devient souvent...", "opts": ["un support", "une zone neutre", "un gap", "rien du tout"], "correct": 0, "explain": "C'est le changement de rôle (flip) : une résistance cassée devient un support."}, {"q": "Plus un niveau a été testé de fois...", "opts": ["moins il compte", "plus il est significatif", "plus il disparaît", "moins il y a de volume"], "correct": 1, "explain": "Un niveau souvent testé est suivi par beaucoup de monde : il est plus important."}]}}, {"id": "struct", "short": "Structure de marché", "meta": "Les bases", "title": "La Structure de marché", "lede": "Lire les sommets et les creux pour savoir dans quel sens va le marché.", "quiz": {"pass": 75, "questions": [{"q": "Une tendance haussière est composée de...", "opts": ["plus hauts et plus bas descendants", "plus hauts (HH) et plus bas (HL) ascendants", "bougies aléatoires", "un seul grand mouvement"], "correct": 1, "explain": "Hausse = HH (plus hauts plus hauts) et HL (plus bas plus hauts)."}, {"q": "Que signifie HL ?", "opts": ["Higher Low (plus bas plus haut)", "High Level", "Half Loss", "Hidden Liquidity"], "correct": 0, "explain": "HL = H var _revObs=null;
function setupReveal(){
  if(_revObs)_revObs.disconnect();
  if(!('IntersectionObserver' in window))return;
  _revObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting)e.target.classList.add('in');
      else e.target.classList.remove('in');
    });
  },{threshold:0.12,rootMargin:'0px 0px -8% 0px'});
  var targets=[];
  document.querySelectorAll('#content .lsec-head').forEach(function(x){targets.push(x);});
  document.querySelectorAll('#content .fcard, #content .step').forEach(function(x,i){x.style.transitionDelay=((i%4)*60)+'ms';targets.push(x);});
  document.querySelectorAll('#content .cta').forEach(function(x){targets.push(x);});
  targets.forEach(function(x){x.classList.add('reveal');_revObs.observe(x);});
}

function injectCharts(html, L){
  // remplace les placeholders ${CHARTx} par le SVG correspondant + caption
  return html.replace(/\$\{(CHART\d)\}/g,(m,key)=>{
    const cfg=L.charts[key];
    if(!cfg) return '';
    let cap='';
    if(L.caps && L.caps[key]) cap=L.caps[key];
    else if(L.cap) cap=L.cap;
    return `<figure class="figure">${chart(cfg)}<figcaption class="cap"><b>FIG</b> ${cap}</figcaption></figure>`;
  });

const LBODY={"bos": "<p><strong>Le Break of Structure (BOS) indique la continuation d'une tendance.</strong> Il se produit quand le prix casse un plus haut (en uptrend) ou un plus bas (en downtrend).</p>\n<div class=\"cardgrid g2\">\n  <div class=\"modcard\"><div class=\"mc-n\">UPTREND</div><h3>BOS haussier</h3><p>Le prix enchaîne des plus hauts (HH) et plus bas (HL) croissants. Quand il casse le dernier plus haut, la structure haussière est confirmée : les acheteurs gardent le contrôle.</p></div>\n  <div class=\"modcard\"><div class=\"mc-n\">DOWNTREND</div><h3>BOS baissier</h3><p>Le prix enchaîne des plus hauts (LH) et plus bas (LL) décroissants. Quand il casse le dernier plus bas, la structure baissière est confirmée : les vendeurs gardent le contrôle.</p></div>\n</div>\n<h2>Règles à retenir</h2>\n<ul>\n  <li>BOS = cassure d'un plus haut en uptrend, ou d'un plus bas en downtrend.</li>\n  <li>Un BOS valide se produit souvent après un <em>CHoCH</em> (premier signe de changement).</li>\n  <li>Le BOS confirme la <strong>continuation</strong> de la tendance.</li>\n  <li>Idéalement, le prix revient tester la zone cassée (<em>retest</em>) avant de continuer.</li>\n</ul>\n<h2>Checklist BOS</h2>\n<ul>\n  <li>Tendance bien définie et CHoCH identifié.</li>\n  <li>Cassure du dernier HH (uptrend) ou LL (downtrend).</li>\n  <li>BOS confirmé + retest si possible.</li>\n  <li>Entrée alignée avec la tendance, gestion du risque (SL / TP).</li>\n</ul>\n<div class=\"callout\"><b>À retenir</b>Le BOS est l'un des concepts les plus importants en Smart Money. Le maîtriser permet d'entrer dans le sens de la tendance et d'augmenter ses probabilités de succès.</div>", "choch": "<p><strong>Le ChoCh (Change of Character) signale un changement de direction du marché.</strong> C'est le premier signe qu'une tendance en place est en train de se retourner.</p>\n<div class=\"cardgrid g2\">\n  <div class=\"modcard\"><div class=\"mc-n\">AVANT</div><h3>BOS dans la tendance</h3><p>Tant que la tendance est intacte, le prix casse ses points dans le même sens : ce sont des BOS (ex. cassures de plus bas en tendance baissière).</p></div>\n  <div class=\"modcard\"><div class=\"mc-n\">BASCULE</div><h3>ChoCh</h3><p>Le prix casse un point structurel <strong>contre</strong> la tendance (ex. un plus haut au-dessus du dernier sommet en tendance baissière). La structure change.</p></div>\n</div>\n<h2>Règle clé</h2>\n<ul>\n  <li>En tendance <strong>baissière</strong> → on cherche un ChoCh <em>haussier</em> (cassure d'un plus haut).</li>\n  <li>En tendance <strong>haussière</strong> → on cherche un ChoCh <em>baissier</em> (cassure d'un plus bas).</li>\n  <li>Après un ChoCh haussier, chaque nouvelle cassure dans le sens haussier devient un <em>BOS haussier</em>.</li>\n</ul>\n<h2>Pourquoi le ChoCh est important</h2>\n<ul>\n  <li>Il signale un potentiel renversement de tendance.</li>\n  <li>Il permet de se placer du bon côté du marché.</li>\n  <li>Il aide à confirmer les entrées et à éviter les faux signaux.</li>\n  <li>À utiliser en confluence (zones clés, order blocks, FVG, liquidité...).</li>\n</ul>\n<div class=\"callout\"><b>BOS vs ChoCh</b>Le BOS confirme la tendance en cours ; le ChoCh est le <strong>premier</strong> signe qu'elle change.</div>", "ob": "<p><strong>Un Order Block est la dernière bougie opposée avant une impulsion forte.</strong> Ce sont des zones où les institutions ont passé de gros ordres avant de provoquer le mouvement.</p>\n<div class=\"cardgrid g2\">\n  <div class=\"modcard\"><div class=\"mc-n\">ACHAT</div><h3>Order Block haussier</h3><p>1. Tendance baissière → 2. dernière bougie baissière avant l'impulsion → 3. impulsion haussière → 4. retour (retest) sur l'OB = zone d'achat.</p></div>\n  <div class=\"modcard\"><div class=\"mc-n\">VENTE</div><h3>Order Block baissier</h3><p>1. Tendance haussière → 2. dernière bougie haussière avant l'impulsion → 3. impulsion baissière → 4. retour (retest) sur l'OB = zone de vente.</p></div>\n</div>\n<h2>Règles clés</h2>\n<ul>\n  <li>Toujours se positionner dans le sens de la tendance (suivre le smart money).</li>\n  <li>Attendre le <em>retest</em> de l'Order Block pour entrer.</li>\n  <li>Placer le stop-loss <strong>derrière</strong> l'Order Block.</li>\n  <li>Prendre ses bénéfices sur les prochaines zones de liquidité ou supports/résistances.</li>\n</ul>\n<h2>Conditions idéales</h2>\n<ul>\n  <li>Structure de marché claire (BOS / ChoCH).</li>\n  <li>Déséquilibre / imbalance présent.</li>\n  <li>Liquidité prise avant l'impulsion.</li>\n  <li>Confluence avec d'autres outils (FVG, Fibonacci, HTF...).</li>\n</ul>\n<div class=\"callout\"><b>Objectif</b>Trader comme les institutions en identifiant leurs zones d'accumulation (achat) ou de distribution (vente). Les Order Blocks agissent comme supports/résistances dynamiques.</div>", "fvg": "<p><strong>Un FVG (Fair Value Gap) est un déséquilibre entre l'offre et la demande créé par un mouvement impulsif.</strong> Le prix a quitté une zone trop vite, laissant un « vide » qu'il a tendance à combler plus tard.</p>\n<h2>Comment le repérer</h2>\n<ul>\n  <li><strong>FVG haussier</strong> : le plus bas de la bougie 3 est au-dessus du plus haut de la bougie 1.</li>\n  <li><strong>FVG baissier</strong> : le plus haut de la bougie 3 est en dessous du plus bas de la bougie 1.</li>\n  <li>Le FVG représente une <em>inefficacité</em> du marché que le prix cherche à combler.</li>\n</ul>\n<h2>Caractéristiques clés</h2>\n<ul>\n  <li>Créé par un mouvement impulsif fort.</li>\n  <li>Agit comme une zone de liquidité / inefficacité.</li>\n  <li>Le prix a tendance à revenir le combler ; peut servir de support ou de résistance.</li>\n  <li>Plus le FVG est grand, plus il est significatif.</li>\n</ul>\n<div class=\"cardgrid g2\">\n  <div class=\"modcard\"><div class=\"mc-n\">MINOR</div><h3>FVG intrabar</h3><p>Formé sur petites unités de temps (M1, M5). Moins fort mais plus fréquent.</p></div>\n  <div class=\"modcard\"><div class=\"mc-n\">MAJOR</div><h3>FVG interbar</h3><p>Formé sur unités de temps élevées (H1, H4, D1). Plus fort et plus fiable.</p></div>\n</div>\n<h2>Comment l'utiliser</h2>\n<ul>\n  <li>Identifier le FVG lors d'un mouvement impulsif.</li>\n  <li>Analyser le contexte (structure, liquidité, tendance).</li>\n  <li>Attendre le retour du prix dans la zone, puis entrer sur confirmation (ChoCh, BOS, rejet).</li>\n  <li>Gérer : stop sous/au-dessus du FVG, viser les prochains niveaux de liquidité.</li>\n</ul>\n<div class=\"callout\"><b>À retenir</b>Tous les FVG ne seront pas comblés : reste sélectif et privilégie les unités de temps élevées, alignées avec la tendance principale.</div>", "liq": "<p><strong>La liquidité est composée des ordres en attente des opérateurs du marché.</strong> Objectif : identifier où elle se trouve pour anticiper les mouvements, car les institutions la chassent avant d'engendrer un mouvement fort.</p>\n<h2>Zones de liquidité clés</h2>\n<ul>\n  <li><strong>Sommets / plus hauts (sell side liquidity)</strong> : ordres vendeurs et stop loss des acheteurs au-dessus des plus hauts.</li>\n  <li><strong>Creux / plus bas (buy side liquidity)</strong> : ordres acheteurs et stop loss des vendeurs en dessous des plus bas.</li>\n  <li><strong>Liquidité intermédiaire (EQH / EQL)</strong> : les égalités de sommets et de creux attirent le prix avant une continuation.</li>\n  <li><strong>Gaps &amp; imbalances</strong> (liquidité cachée) : souvent comblés pour prendre la liquidité.</li>\n</ul>\n<h2>Processus stratégique</h2>\n<ul>\n  <li><strong>Identifier</strong> les zones de liquidité clés.</li>\n  <li><strong>Planifier</strong> le scénario et les niveaux d'intérêt.</li>\n  <li><strong>Attendre la confirmation</strong> : le prix doit prendre la liquidité et donner un signal clair.</li>\n  <li><strong>Exécuter</strong> dans le sens du mouvement institutionnel.</li>\n  <li><strong>Gérer le risque</strong> : stop au-delà de la zone visée, RR favorable.</li>\n</ul>\n<h2>Principes clés</h2>\n<ul>\n  <li>La liquidité attire le prix comme un aimant.</li>\n  <li>Les institutions prennent la liquidité avant de provoquer un mouvement.</li>\n  <li>Ne jamais anticiper : toujours attendre la prise de liquidité.</li>\n  <li>Travailler en confluence avec la tendance et la structure.</li>\n</ul>\n<div class=\"callout\"><b>Discipline · Patience · Précision</b>Maîtriser la liquidité, c'est opérer comme les professionnels. Le risque maîtrisé assure la survie, la stratégie assure la performance.</div>", "pd": "<p><strong>Premium &amp; Discount</strong> permet de savoir si le prix est dans la partie haute (cher) ou basse (bon marché) d'un range de référence. On utilise le <em>50% (Fibonacci)</em> comme ligne d'équilibre.</p>\n<div class=\"cardgrid g2\">\n  <div class=\"modcard\"><div class=\"mc-n\">AU-DESSUS DU 50%</div><h3>Premium (cher)</h3><p>Le prix est considéré comme cher. Zone de vente privilégiée : on cherche des opportunités <strong>SELL</strong>.</p></div>\n  <div class=\"modcard\"><div class=\"mc-n\">EN DESSOUS DU 50%</div><h3>Discount (bon marché)</h3><p>Le prix est considéré comme bon marché. Zone d'achat privilégiée : on cherche des opportunités <strong>BUY</strong>.</p></div>\n</div>\n<p>Le <strong>50%</strong> est la zone d'équilibre : le prix peut réagir des deux côtés, donc on attend une confirmation (structure, order block, ChoCH...).</p>\n<h2>Règles clés</h2>\n<ul>\n  <li>Définir un range clair : dernier swing high (0%) et swing low (100%).</li>\n  <li>Tracer les niveaux de Fibonacci ; le 50% est la ligne clé.</li>\n  <li>Chercher des confluences (structure, order blocks, liquidité, FVG...).</li>\n  <li>Ne pas acheter en premium ni vendre en discount <strong>sans confirmation</strong>.</li>\n</ul>\n<h2>Timeframes</h2>\n<ul>\n  <li>D1 / 4H : vue macro (définir le range).</li>\n  <li>1H / 15M : exécution.</li>\n</ul>\n<div class=\"callout\"><b>Objectif</b>Acheter bas (discount) et vendre haut (premium), avec confluence et gestion du risque. Le marché tend à revenir vers la moyenne (50%).</div>", "of": "<p><strong>L'orderflow consiste à lire les ordres exécutés en temps réel</strong> pour comprendre l'agressivité des acheteurs et des vendeurs.</p>\n<h2>Les 3 outils de base</h2>\n<div class=\"cardgrid g3\">\n  <div class=\"modcard\"><div class=\"mc-n\">01</div><h3>Carnet d'ordres</h3><p>Les volumes <strong>BID</strong> = ordres d'achat en attente. Les volumes <strong>ASK</strong> = ordres de vente en attente.</p></div>\n  <div class=\"modcard\"><div class=\"mc-n\">02</div><h3>Footprint</h3><p>Volume exécuté à chaque prix. On distingue les achats agressifs (market buy) des ventes agressives (market sell).</p></div>\n  <div class=\"modcard\"><div class=\"mc-n\">03</div><h3>Delta</h3><p>Achats − ventes. Delta positif = plus d'achats agressifs ; delta négatif = plus de ventes agressives.</p></div>\n</div>\n<h2>Exemples d'interprétation</h2>\n<ul>\n  <li><strong>Absorption (achat)</strong> : un gros volume d'achats agressifs absorbe les ventes au même prix → signal haussier.</li>\n  <li><strong>Absorption (vente)</strong> : un gros volume de ventes agressives absorbe les achats → signal baissier.</li>\n  <li><strong>Breakout avec delta</strong> : le prix casse la résistance avec un delta fortement positif → signal haussier fort.</li>\n  <li><strong>Divergence</strong> : le prix fait des plus hauts mais le delta fait des plus bas → faiblesse cachée, risque de retournement.</li>\n</ul>\n<div class=\"callout\"><b>À retenir</b>L'orderflow montre QUI est agressif (acheteurs ou vendeurs) et aide à repérer absorptions, breakouts fiables et divergences. À combiner avec le contexte (support/résistance, structure de marché).</div>", "sr": "<div class=\"callout\"><b>Définition</b> Un <strong>support</strong> est une zone où les acheteurs reprennent le contrôle et stoppent la baisse. Une <strong>résistance</strong> est une zone où les vendeurs reprennent le contrôle et stoppent la hausse.</div>\n<h2>Comment le prix réagit</h2>\n<ul>\n<li><strong>Rebond</strong> : le prix touche la zone et repart dans l'autre sens.</li>\n<li><strong>Cassure</strong> : le prix traverse la zone avec force → le niveau est invalidé.</li>\n</ul>\n<h2>Le changement de rôle (flip)</h2>\n<p>Quand une <strong>résistance est cassée</strong>, elle se transforme souvent en <strong>support</strong> (et inversement). C'est l'une des zones de retour les plus fiables du marché.</p>\n<h2>Les types de niveaux</h2>\n<ul>\n<li><strong>Horizontaux</strong> : basés sur d'anciens sommets/creux. Les plus simples et les plus suivis.</li>\n<li><strong>Dynamiques</strong> : une moyenne mobile ou une oblique qui suit le prix.</li>\n<li><strong>Zones</strong> plutôt que lignes exactes : le marché réagit sur une fourchette de prix, pas au pip près.</li>\n</ul>\n<div class=\"takeaways\"><div class=\"th\">À retenir</div><ul><li>Plus un niveau est testé, plus il compte. Et la confluence (S/R + Fibonacci + order block) augmente fortement la fiabilité.</li></ul></div>", "struct": "<div class=\"callout\"><b>Définition</b> La <strong>structure de marché</strong>, c'est la façon dont le prix s'organise en une succession de sommets et de creux. La lire, c'est savoir dans quel sens va le marché — la base de toute analyse.</div>\n<h2>Le vocabulaire</h2>\n<ul>\n<li><strong>HH</strong> (Higher High) : un plus haut, plus haut que le précédent.</li>\n<li><strong>HL</strong> (Higher Low) : un plus bas, plus haut que le précédent.</li>\n<li><strong>LH / LL</strong> (Lower High / Lower Low) : l'inverse, en tendance baissière.</li>\n</ul>\n<h2>Les trois états du marché</h2>\n<ul>\n<li><strong>Tendance haussière</strong> : enchaînement de HH et HL (sommets et creux ascendants).</li>\n<li><strong>Tendance baissière</strong> : enchaînement de LH et LL (sommets et creux descendants).</li>\n<li><strong>Range</strong> : ni HH ni LL clairs, le prix oscille entre un support et une résistance.</li>\n</ul>\n<div class=\"takeaways\"><div class=\"th\">À retenir</div><ul><li>Toujours déterminer la structure AVANT de chercher une entrée. La cassure de ces points (HH/HL) donnera les BOS et ChoCh des leçons suivantes.</li></ul></div>", "breaker": "<div class=\"callout\"><b>Définition</b> La <strong>mitigation</strong> est le retour du prix sur une zone pour « équilibrer » des positions institutionnelles. Un <strong>breaker block</strong> est un order block qui a échoué (été cassé) et qui, une fois reconquis, change de rôle.</div>\n<h2>Comment se forme un breaker</h2>\n<ul>\n<li>Un order block se forme, mais le prix le <strong>casse</strong> (la zone échoue).</li>\n<li>Le prix revient ensuite sur cette zone cassée.</li>\n<li>Elle joue alors le rôle inverse : un OB de vente cassé devient un <strong>support</strong> (breaker haussier), et inversement.</li>\n</ul>\n<h2>Comment l'utiliser</h2>\n<ul>\n<li>Attendre le <strong>retest</strong> du breaker pour entrer dans le sens de la cassure.</li>\n<li>Le combiner avec la structure (BOS/ChoCh) et une prise de liquidité.</li>\n<li>Stop de l'autre côté du breaker, comme pour un order block classique.</li>\n</ul>\n<div class=\"takeaways\"><div class=\"th\">À retenir</div><ul><li>Un niveau qui « échoue » n'est pas inutile : reconquis, il devient une zone d'entrée fiable. Le breaker, c'est le flip version order block.</li></ul></div>", "induce": "<div class=\"callout\"><b>Définition</b> L'<strong>inducement</strong> est une liquidité « appât » : un petit creux ou sommet évident qui pousse les traders à entrer trop tôt, juste avant la vraie zone d'intérêt.</div>\n<h2>Pourquoi ça existe</h2>\n<p>Le smart money a besoin de liquidité pour remplir ses ordres. L'inducement crée une zone « évidente » où la foule se positionne… pour mieux venir prendre ses stops avant de partir.</p>\n<h2>Comment le repérer & l'éviter</h2>\n<ul>\n<li>Méfie-toi du niveau « trop évident » placé juste avant un order block ou une zone clé.</li>\n<li>Attends que cet inducement soit <strong>pris</strong> (balayé) avant d'entrer sur la vraie zone, plus profonde.</li>\n<li>Entrer sur l'inducement = se faire piéger ; entrer après = suivre le smart money.</li>\n</ul>\n<div class=\"takeaways\"><div class=\"th\">À retenir</div><ul><li>Si une entrée paraît trop facile et évidente, c'est souvent un inducement. La patience (attendre la prise) fait la différence.</li></ul></div>", "mtf": "<div class=\"callout\"><b>Définition</b> L'<strong>analyse multi-timeframe</strong> consiste à utiliser une grande unité de temps (HTF) pour le <strong>biais</strong> et une petite (LTF) pour <strong>l'entrée</strong>.</div>\n<h2>Le principe</h2>\n<ul>\n<li><strong>HTF (D1 / H4)</strong> : où va le marché ? Quelles zones clés (OB, S/R, premium/discount) ?</li>\n<li><strong>LTF (M15 / M5)</strong> : quand entrer ? On affine le timing dans la zone HTF.</li>\n</ul>\n<h2>La règle d'or</h2>\n<p>On ne trade le LTF que <strong>dans le sens du HTF</strong>. Un signal LTF contre la tendance HTF est un piège.</p>\n<h2>L'enchaînement type</h2>\n<ul>\n<li>HTF : repérer la zone et le biais.</li>\n<li>Attendre que le prix atteigne la zone.</li>\n<li>LTF : sweep + ChoCh → entrée précise, stop serré, gros R:R.</li>\n</ul>\n<div class=\"takeaways\"><div class=\"th\">À retenir</div><ul><li>Le HTF donne la direction, le LTF donne le timing. Les deux alignés = les meilleurs trades.</li></ul></div>", "sessions": "<div class=\"callout\"><b>Définition</b> Les <strong>sessions</strong> (Asie, Londres, New York) rythment la journée. Les <strong>killzones</strong> sont les fenêtres à forte activité, surtout autour des ouvertures de Londres et de New York.</div>\n<h2>Les sessions</h2>\n<ul>\n<li><strong>Asie</strong> : souvent calme, ranges étroits (accumule la liquidité).</li>\n<li><strong>Londres</strong> : forte volatilité, souvent le vrai départ de la journée.</li>\n<li><strong>New York</strong> : très liquide ; l'overlap Londres/NY est explosif.</li>\n</ul>\n<h2>Pourquoi ça compte</h2>\n<ul>\n<li>La volatilité et la liquidité ne sont pas réparties également : trader au bon moment augmente la fiabilité.</li>\n<li>Les killzones offrent les mouvements les plus nets (sweeps, BOS, retournements).</li>\n<li>En heures creuses, mieux vaut s'abstenir : faux signaux, faible volume.</li>\n</ul>\n<div class=\"takeaways\"><div class=\"th\">À retenir</div><ul><li>Adapte tes horaires à ton fuseau et à ton instrument (NQ/Gold aiment l'open de New York). Les heures exactes varient — repère TES killzones.</li></ul></div>"};

function renderLesson(i){
  (function(){var c=document.getElementById('content'); if(c)c.classList.remove('wide-tool');})();
  const L=LESSONS[i];
  const q=L.quiz;
  const isLast=i===LESSONS.length-1;

  // --- 1. Split LBODY into logical sections ---
  // Each top-level <h2> starts a new section. Content before the first <h2> is the intro.
  const raw=(LBODY[L.id]||'').trim();
  let sections=[]; // {title, html}
  if(raw){
    const parts=raw.split(/(?=<h2>)/g);
    parts.forEach(p=>{
      p=p.trim(); if(!p)return;
      const m=p.match(/^<h2>(.*?)<\/h2>([\s\S]*)$/);
      if(m){sections.push({title:m[1].trim(), html:m[2].trim()});}
      else {sections.push({title:null, html:p});} // intro chunk
    });
  }
  if(!sections.length)sections=[{title:null,html:''}];

  // --- 2. Build the animated-chart + video step ---
  const ex=(LCHARTS[L.id]||[]);
  const lsteps=(typeof LSTEPS!=="undefined")?LSTEPS[L.id]:null;
  let chartHtml='';
  if(ex.length){
    chartHtml = ex.map(c=>(lsteps?vchart(c.cfg,lsteps):`<figure class="figure">${chart(c.cfg)}</figure>`)).join('');
  }
  const vid=(L.video||'').trim();
  let videoHtml='';
  if(vid){
    videoHtml = `<div class="lvideo"><div class="vlbl">Vidéo · pour aller plus loin</div><div class="frame"><iframe src="https://www.youtube.com/embed/${vid}" title="Vidéo de la leçon" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div></div>`;
  }

  // --- 3. Assemble the ordered list of stages ---
  // intro -> [animated chart+video] -> remaining sections -> quiz
  let stages=[]; // {kicker, heading, body}
  let secIdx=0;
  // intro (first section, title null OR first titled section as "definition")
  if(sections[0].title===null){
    stages.push({kicker:'La définition', heading:'En bref', body:sections[0].html});
    secIdx=1;
  }
  // animated chart step (only if we have one)
  if(chartHtml || videoHtml){
    stages.push({kicker:'En images', heading:'Le mécanisme, pas à pas', body:chartHtml+videoHtml});
  }
  // remaining titled sections
  for(let k=secIdx;k<sections.length;k++){
    stages.push({kicker:'Notions', heading:sections[k].title||'À savoir', body:sections[k].html});
  }
  // quiz is appended separately as the final stage
  const totalSteps=stages.length+1;

  // --- 4. Render ---
  const qHtml=q.questions.map((qq,qi)=>{
    return `<div class="q" data-qi="${qi}">
      <div class="q-text"><span class="qn">Q${qi+1}</span><span>${qq.q}</span></div>
      <div class="opts">${qq.opts.map((o,oi)=>`<button class="opt" data-qi="${qi}" data-oi="${oi}"><span class="dot"></span><span>${o}</span></button>`).join('')}</div>
      <div class="explain" data-exp="${qi}"><b>Explication —</b> ${qq.explain}</div>
    </div>`;
  }).join('');

  const dots=Array.from({length:totalSteps}).map((_,k)=>`<div class="lstep-dot${k===0?' active':''}" data-k="${k}"><div class="fill"></div></div>`).join('');

  const stageHtml=stages.map((st,k)=>`
    <div class="lstage${k===0?' active':''}" data-step="${k}">
      <div class="s-kicker">${k+1} — ${st.kicker}</div>
      <h2 class="s-h">${st.heading}</h2>
      <div class="lbody">${st.body}</div>
    </div>`).join('');

  const quizStep=`
    <div class="lstage" data-step="${totalSteps-1}">
      <div class="s-kicker">${totalSteps} — Quiz</div>
      <h2 class="s-h">Valide la leçon</h2>
      <p style="font-size:14px;color:var(--muted);margin-bottom:22px">Réponds aux ${q.questions.length} questions. Il faut ${q.pass}% de bonnes réponses pour débloquer la suite.</p>
      <div class="quiz-body" id="quizBody" style="padding:0">${qHtml}</div>
      <div class="quiz-foot" style="padding:22px 0 0;margin-top:10px">
        <div class="result" id="result" style="visibility:hidden"><span class="score" id="scoreNum">0%</span><span class="tag" id="scoreTag">—</span></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" id="retryBtn" style="display:none">Recommencer</button>
          <button class="btn btn-primary" id="submitBtn" disabled>Valider le quiz</button>
        </div>
      </div>
      <div class="lesson-nav">
        <button class="btn btn-ghost" id="prevBtn" ${i===0?'style="visibility:hidden"':''}>← Leçon précédente</button>
        <div class="next-cta">
          <span id="nextHint" style="font-size:13px;color:var(--muted)">${state.completed[i]?'Leçon validée ✓':'Valide le quiz pour continuer'}</span>
          <button class="btn btn-primary" id="nextBtn" ${(!isLast && state.completed[i])?'':'disabled'} ${isLast?'style="display:none"':''}>Leçon suivante →</button>
          ${isLast?`<button class="btn btn-primary" id="finishBtn" ${state.completed[i]?'':'disabled'}>Terminer le parcours 🏆</button>`:''}
        </div>
      </div>
    </div>`;

  const html=`
    ${learnToggle('lessons')}
    <div class="eyebrow">${L.meta} · Leçon ${String(i+1).padStart(2,'0')}/${String(LESSONS.length).padStart(2,'0')}</div>
    <h1 class="lesson-title">${L.title}</h1>
    <p class="lesson-lede">${L.lede}</p>
    <div class="lstepper" id="lstepper">${dots}</div>
    <div class="lstep-lbl" id="lstepLbl">Étape 1 sur ${totalSteps}</div>
    ${stageHtml}
    ${quizStep}
    <div class="lpager" id="lpager">
      <button class="btn btn-ghost" id="lprev" disabled>← Précédent</button>
      <span class="pcount" id="lpcount">1 / ${totalSteps}</span>
      <button class="btn btn-primary" id="lnext">Suivant →</button>
    </div>
  `;
  $('#content').innerHTML=html;
  window.scrollTo(0,0);
  bindLearnToggle();
  bindQuiz(i);
  $('#prevBtn')?.addEventListener('click',()=>goTo(i-1));
  $('#nextBtn')?.addEventListener('click',()=>{if(state.completed[i])goTo(i+1)});
  $('#finishBtn')?.addEventListener('click',()=>{if(state.completed[i])renderCertificate()});

  // --- 5. Stepper navigation ---
  let cur=0; let vcBooted=false;
  const chartStepIndex=stages.findIndex(st=>st.kicker==='En images');
  function showStep(n){
    cur=Math.max(0,Math.min(totalSteps-1,n));
    document.querySelectorAll('#content .lstage').forEach(st=>st.classList.toggle('active',+st.dataset.step===cur));
    document.querySelectorAll('#content .lstep-dot').forEach((d,di)=>{d.classList.toggle('active',di===cur);d.classList.toggle('done',di<cur);});
    const lbl=$('#lstepLbl'); if(lbl)lbl.textContent='Étape '+(cur+1)+' sur '+totalSteps;
    const pc=$('#lpcount'); if(pc)pc.textContent=(cur+1)+' / '+totalSteps;
    const pv=$('#lprev'); if(pv)pv.disabled=(cur===0);
    const nx=$('#lnext'); if(nx)nx.style.display=(cur===totalSteps-1)?'none':'inline-block';
    // boot the animated chart only when its step is first shown
    if(!vcBooted && chartStepIndex>=0 && cur===chartStepIndex){bootVCharts();vcBooted=true;}
    window.scrollTo({top:0,behavior:'smooth'});
  }
  $('#lnext')?.addEventListener('click',()=>showStep(cur+1));
  $('#lprev')?.addEventListener('click',()=>showStep(cur-1));
  document.querySelectorAll('#content .lstep-dot').forEach(d=>d.addEventListener('click',()=>showStep(+d.dataset.k)));
  // if chart is on the very first step, boot immediately
  if(chartStepIndex===0){bootVCharts();vcBooted=true;}
}

function bindQuiz(lessonIdx){
  const L=LESSONS[lessonIdx];
  const q=L.quiz;
  const picked={}; // qi -> oi
  let graded=false;

  const opts=document.querySelectorAll('#quizBody .opt');
  opts.forEach(opt=>{
    opt.addEventListener('click',()=>{
      if(graded)return;
      const qi=+opt.dataset.qi, oi=+opt.dataset.oi;
      picked[qi]=oi;
      document.querySelectorAll(`#quizBody .opt[data-qi="${qi}"]`).forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      if(Object.keys(picked).length===q.questions.length){$('#submitBtn').disabled=false}
    });
  });

  $('#submitBtn').addEventListener('click',()=>{
    if(graded)return;
    graded=true;
    let correct=0;
    q.questions.forEach((qq,qi)=>{
      const chosen=picked[qi];
      document.querySelectorAll(`#quizBody .opt[data-qi="${qi}"]`).forEach(o=>{
        o.disabled=true;
        const oi=+o.dataset.oi;
        if(oi===qq.correct)o.classList.add('correct');
        else if(oi===chosen)o.classList.add('wrong');
      });
      document.querySelector(`.explain[data-exp="${qi}"]`).classList.add('show');
      if(chosen===qq.correct)correct++;
    });
    const pct=Math.round(correct/q.questions.length*100);
    const pass=pct>=q.pass;
    const res=$('#result');
    res.style.visibility='visible';
    res.classList.add(pass?'pass':'fail');
    $('#scoreNum').textContent=pct+'%';
    $('#scoreTag').textContent=pass?`Validé · ${correct}/${q.questions.length}`:`Raté · ${correct}/${q.questions.length}`;
    $('#submitBtn').style.display='none';
    $('#retryBtn').style.display='inline-block';

    if(pass){
      state.completed[lessonIdx]=true;
      saveProgress();
      renderNav();
      const nb=$('#nextBtn'); if(nb)nb.disabled=false;
      const fb=$('#finishBtn'); if(fb)fb.disabled=false;
      const hint=$('#nextHint'); if(hint)hint.textContent='Leçon validée ✓ — tu peux continuer';
    }
  });

  $('#retryBtn').addEventListener('click',()=>renderLesson(lessonIdx));
}

function goTo(i){
  if(i<0||i>=LESSONS.length)return;
  state.current=i;
  state.view='lesson';
  renderNav();
  renderLesson(i);
  renderTabs();
}

  sbuild(sbase);
  var hraf;
  if(!reduce){
    var phase=0,hlast=0,HF=1000/30;
    function wave(ts){hraf=requestAnimationFrame(wave);if(ts-hlast<HF)return;hlast=ts;phase+=0.05;sbuild(sbase.map(function(y,i){return y+Math.sin(phase+i*0.7)*2.2;}));}
    hraf=requestAnimationFrame(wave);
  }

  // intervalles vivants (stockés pour cleanup au changement de vue)
  if(window.__homeTimers){window.__homeTimers.forEach(clearInterval);} window.__homeTimers=[];
  if(!reduce){
    var pxs=[].slice.call(document.querySelectorAll('.gpr[data-px]'));

    },2200));
    var pctEl=document.getElementById('hdPct');

      if(document.hidden||state.view!=='home')return;
      var np=10.5+Math.random()*4;pctEl.textContent='+'+np.toFixed(1)+'%';
      var oldS=displayed||targetSolde,newS=Math.round(CAPITAL*(1+np/100));
      pctEl.style.color=np>=curPct?'#34D399':'#F87171';curPct=np;tweenSolde(oldS,newS);
      soldeEl.style.transition='color .3s';soldeEl.style.color=newS>=oldS?'#34D399':'#F87171';setTimeout(function(){soldeEl.style.color='';},650);
    },3000));
    var rrs=[].slice.call(document.querySelectorAll('.gpr[data-rr]'));
    window.__homeTimers.push(setInterval(function(){
      if(document.hidden||state.view!=='home')return;
      rrs.forEach(function(el){var b=parseFloat(el.dataset.rr);var v=(b+(Math.random()-.5)*0.6).toFixed(1);if(v<1)v='1.0';el.textContent='R:R '+v;});
    },3400));
    var stEl=document.getElementById('hdScan'),sc=30;
    window.__homeTimers.push(setInterval(function(){
      if(document.hidden||state.view!=='home')return;
      sc--;if(sc<0)sc=30;stEl.textContent=sc+'s';
    },1000));
  }

  // reveal au scroll
  var revs=[].slice.call(document.querySelectorAll('#content .reveal'));
  if(reduce){ revs.forEach(function(el){el.classList.add('in');}); }
  else if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    },{threshold:.15,rootMargin:'0px 0px -8% 0px'});
    revs.forEach(function(el){io.observe(el);});
  } else { revs.forEach(function(el){el.classList.add('in');}); }

  renderNav();renderTabs();window.scrollTo(0,0);
}

5, "p": 30.4}, {"i": 6, "p": 30.6}, {"i": 7, "p": 31}], "color": "bull", "label": "VWAP"}]}, "cap": "Tant que le prix tient au-dessus du VWAP, on privilégie les achats ; chaque retour sur la ligne est une zone d'entrée."}, {"name": "ATR (Average True Range)", "body": "<p><strong>L'ATR mesure la volatilité moyenne</strong> : l'amplitude moyenne d'une bougie. Il ne donne pas de direction, mais il est essentiel pour <strong>placer ses stops et dimensionner ses positions</strong>.</p><ul><li>Stop trop serré = sorti par le bruit ; trop large = risque inutile. L'ATR donne la bonne distance.</li><li>Méthode classique : <strong>stop = entrée − (1,5 à 2 × ATR)</strong> (à l'inverse pour un short).</li><li>Plus l'ATR est élevé, plus il faut réduire la taille de position (voir le gestionnaire de risque).</li><li>Permet aussi d'adapter ses objectifs en visant un multiple de l'ATR.</li></ul>", "cfg": {"candles": [{"o": 24, "h": 27, "l": 23, "c": 26}, {"o": 26, "h": 30, "l": 25, "c": 29}, {"o": 29, "h": 33, "l": 28, "c": 32}, {"o": 32, "h": 34, "l": 29, "c": 30}, {"o": 30, "h": 31, "l": 27, "c": 28}, {"o": 28, "h": 33, "l": 27, "c": 32}, {"o": 32, "h": 37, "l": 31, "c": 36}], "lines": [{"price": 30, "color": "bull", "label": "entrée", "x0": 3, "x1": 6}, {"price": 26.5, "color": "bear", "dashed": true, "label": "stop ≈ 1,5×ATR", "x0": 3, "x1": 6}], "markers": [{"i": 4, "dir": "up", "label": "entrée", "color": "bull"}]}, "cap": "Stop placé à ~1,5×ATR sous l'entrée : assez de marge pour laisser respirer le trade sans faire exploser le risque."}, {"name": "Le Volume", "body": "<p><strong>Le volume mesure la quantité réellement échangée.</strong> C'est le carburant derrière chaque mouvement : un prix qui monte sans volume est suspect.</p><ul><li>Une <strong>cassure accompagnée d'un fort volume</strong> est bien plus fiable qu'une cassure « molle ».</li><li>Un volume en hausse confirme la tendance ; un volume qui s'épuise annonce souvent un essoufflement.</li><li>Un pic de volume sur une mèche (climax) signale parfois une prise de liquidité / un retournement.</li><li>Se lit encore mieux avec l'order flow (footprint, delta) vu en leçon 7.</li></ul>", "cfg": {"candles": [{"o": 28, "h": 30, "l": 27, "c": 29}, {"o": 29, "h": 30, "l": 28, "c": 29}, {"o": 29, "h": 31, "l": 28, "c": 30}, {"o": 30, "h": 31, "l": 29, "c": 30}, {"o": 30, "h": 36, "l": 29, "c": 35}, {"o": 35, "h": 38, "l": 34, "c": 37}, {"o": 37, "h": 40, "l": 36, "c": 39}], "lines": [{"price": 31, "color": "gold", "dashed": true, "label": "résistance", "x0": 0, "x1": 6}], "markers": [{"i": 4, "dir": "up", "label": "cassure + volume", "color": "bull"}]}, "cap": "La résistance cède sur une bougie à fort volume : la cassure est confirmée, pas un simple faux signal."}, {"name": "Retracement de Fibonacci", "body": "<p><strong>Les retracements de Fibonacci</strong> projettent les zones où le prix peut revenir avant de poursuivre sa tendance. Niveaux clés : 0,382 — 0,5 — <strong>0,618</strong> — 0,786.</p><ul><li>On trace du début à la fin d'une impulsion. Le prix retrace souvent dans la « <strong>golden zone</strong> » 0,5–0,618.</li><li>Même principe que le <em>Premium &amp; Discount</em> : sous le 0,5 = discount (achat), au-dessus = premium (vente).</li><li>La force vient de la <strong>confluence</strong> : un niveau de Fibo + un order block + un FVG au même endroit = entrée à haute probabilité.</li><li>Ne jamais entrer sur le seul niveau de Fibo : attendre une confirmation (rejet, ChoCh).</li></ul>", "cfg": {"candles": [{"o": 24, "h": 27, "l": 23, "c": 26}, {"o": 26, "h": 31, "l": 25, "c": 30}, {"o": 30, "h": 36, "l": 29, "c": 35}, {"o": 35, "h": 40, "l": 34, "c": 39}, {"o": 39, "h": 40, "l": 35, "c": 36}, {"o": 36, "h": 37, "l": 31, "c": 32}, {"o": 32, "h": 34, "l": 30, "c": 31}, {"o": 31, "h": 38, "l": 30, "c": 37}], "zones": [{"from": 30.1, "to": 33.9, "type": "bull", "label": "golden zone"}], "lines": [{"price": 33.9, "color": "gold", "dashed": true, "label": "0,382"}, {"price": 32, "color": "gold", "dashed": true, "label": "0,5"}, {"price": 30.1, "color": "gold", "dashed": true, "label": "0,618"}], "markers": [{"i": 6, "dir": "up", "label": "rebond", "color": "bull"}]}, "cap": "Le prix retrace dans la golden zone 0,5–0,618 puis repart : zone d'entrée privilégiée, encore meilleure avec un order block."}];

function renderRisk(){
  (function(){var c=document.getElementById('content'); if(c)c.classList.remove('wide-tool');})();
  state.view='risk';
  var aOpts=ASSETS.map(function(a,i){return '<option value="'+i+'">'+a.name+'</option>';}).join('');
  $('#content').innerHTML=`
    <div class="eyebrow">Outil · Gestion du risque</div>
    <h1 class="lesson-title">Gestionnaire de risque</h1>
    <p class="lesson-lede">Dimensionne ta position selon ton capital, ton risque et l'actif. Renseigne les champs : la taille de position se calcule toute seule.</p>
    <div class="rm">
      <div class="rm-form">
        <div class="rm-field"><label>Capital du compte</label><input id="rmCap" type="number" value="50000" min="0" step="100"></div>
        <div class="rm-row">
          <div class="rm-field"><label>Risque par trade (%)</label><input id="rmPct" type="number" value="1" min="0" step="0.1"></div>
          <div class="rm-field"><label>Actif tradé</label><select id="rmAsset">`+aOpts+`</select></div>
        </div>
        <div class="rm-row">
          <div class="rm-field"><label id="rmStopLbl">Stop-loss (points)</label><input id="rmStop" type="number" value="20" min="0" step="0.1"></div>
          <div class="rm-field"><label id="rmTpLbl">Objectif / TP (option.)</label><input id="rmTp" type="number" value="40" min="0" step="0.1"></div>
        </div>
      </div>
      <div class="rm-out">
        <div class="rm-sub">Taille de position recommandée</div>
        <div class="rm-big" id="rmSize">—</div>
        <div class="rm-sub" id="rmUnit">—</div>
        <div class="rm-stats">
          <div class="rm-stat"><div class="v" id="rmReal">—</div><div class="k">Risque réel au stop</div></div>
          <div class="rm-stat"><div class="v" id="rmPv">—</div><div class="k">Valeur d'1 point (position)</div></div>
          <div class="rm-stat"><div class="v" id="rmRisk">—</div><div class="k">Risque ciblé (1R)</div></div>
          <div class="rm-stat"><div class="v" id="rmRR">—</div><div class="k">Ratio R:R (au TP)</div></div>
        </div>
        <div class="rm-warn" id="rmWarn" style="display:none"></div>
        <div class="rm-note">Montants dans la devise de ton compte (les futures cotent en USD). À combiner avec une bonne lecture de marché : un dimensionnement correct ne remplace pas un bon point d'entrée.</div>
      </div>
    </div>
  `;
  function fmt(x){return (Math.round(x*100)/100).toLocaleString('fr-FR',{maximumFractionDigits:2});}
  function compute(){
    var a=ASSETS[+$('#rmAsset').value];
    var cap=parseFloat($('#rmCap').value)||0, pct=parseFloat($('#rmPct').value)||0;
    var stop=parseFloat($('#rmStop').value)||0, tp=parseFloat($('#rmTp').value)||0;
    $('#rmStopLbl').textContent='Stop-loss ('+a.unitLabel+')';
    $('#rmTpLbl').textContent='Objectif / TP ('+a.unitLabel+', option.)';
    var riskTarget=cap*pct/100, warn=$('#rmWarn');
    $('#rmRisk').textContent=fmt(riskTarget)+' $';
    if(stop<=0||riskTarget<=0){
      ['rmSize','rmReal','rmPv','rmRR'].forEach(function(id){$('#'+id).textContent='—';});
      $('#rmUnit').textContent='Renseigne capital, risque et stop'; warn.style.display='none';
    } else {
      var raw=riskTarget/(stop*a.vpp);
      var size=Math.round((Math.floor(raw/a.step)*a.step)/a.step)*a.step;
      var real=size*stop*a.vpp, pvPos=a.vpp*size, code=a.name.split(' — ')[0];
      $('#rmSize').textContent=fmt(size);
      $('#rmUnit').textContent=(size>1?a.unit+'s':a.unit)+' · '+code;
      $('#rmReal').textContent=fmt(real)+' $';
      $('#rmPv').textContent=fmt(pvPos)+' $';
      $('#rmRR').textContent=(tp>0)?'1 : '+(Math.round(tp/stop*100)/100).toLocaleString('fr-FR',{maximumFractionDigits:2}):'—';
      if(size<=0){ warn.style.display='block'; warn.textContent='\u26A0 Avec ce stop et ce risque, tu ne peux pas prendre même 1 '+a.unit+'. Réduis le stop, augmente le capital, ou (déconseillé) accepte un risque plus élevé.'; }
      else { warn.style.display='none'; }
    }
  }

function renderIndicators(){
  (function(){var c=document.getElementById('content'); if(c)c.classList.remove('wide-tool');})();
  state.view='indic';

  // build the static shell: selector + a mount for the active indicator's stepper
  var icons={0:'<path d="M4 19V5"/><path d="M4 19h16"/><polyline points="7 14 11 10 14 13 19 7"/>',1:'<circle cx="12" cy="12" r="8"/><path d="M12 8v4l2.5 2"/>',2:'<path d="M4 12h16"/><path d="M4 12c3-7 13-7 16 0"/>',3:'<path d="M6 4v16M18 4v16"/><path d="M6 9h12M6 15h12"/>',4:'<rect x="4" y="13" width="3" height="7"/><rect x="10" y="8" width="3" height="12"/><rect x="16" y="4" width="3" height="16"/>',5:'<path d="M4 18h16"/><path d="M4 14h10"/><path d="M4 10h6"/>'};
  var tabs=INDIC.map(function(d,idx){
    var label=(d.name.split('(')[0]).trim();
    return '<button data-ind="'+idx+'"><span class="si-ic"><svg viewBox="0 0 24 24">'+(icons[idx]||'')+'</svg></span>'+label+'</button>';
  }).join('');

  $('#content').innerHTML=
    learnToggle('indic')+
    '<div class="eyebrow">Boîte à outils · Indicateurs</div>'+
    '<h1 class="lesson-title">Les indicateurs essentiels</h1>'+
    '<p class="lesson-lede">Les indicateurs ne remplacent pas la structure (SMC) : ils la <strong>confirment</strong>. Choisis un indicateur et avance étape par étape.</p>'+
    '<div class="indic-sel" id="indicSel">'+tabs+'<span class="indic-count">'+INDIC.length+' outils</span></div>'+
    '<div id="indicMount"></div>';

  var active=0;

  function renderOne(idx){
    var d=INDIC[idx];
    // --- split body into: definition (first <p>) + key points (the <ul>) ---
    var raw=(d.body||'').trim();
    var defHtml='', listHtml='';
    var pm=raw.match(/^([\s\S]*?<\/p>)([\s\S]*)$/);
    if(pm){ defHtml=pm[1].trim(); listHtml=pm[2].trim(); }
    else { defHtml=raw; }

    // animated chart + optional video
    var pl=(typeof ISTEPS!=="undefined"&&ISTEPS[idx])? vchart(d.cfg,ISTEPS[idx]) : ('<figure class="figure">'+chart(d.cfg)+'</figure>');
    var vid=(d.video||'').trim();
    var videoHtml = vid ? ('<div class="lvideo"><div class="vlbl">Vidéo · pour aller plus loin</div><div class="frame"><iframe src="https://www.youtube.com/embed/'+vid+'" title="Vidéo indicateur" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div></div>') : '';

    // assemble stages
    var stages=[];
    stages.push({kicker:'La définition', heading:'En bref', body:defHtml});
    stages.push({kicker:'En images', heading:'Exemple concret', body:'<p class="ex-intro">'+d.cap+'</p>'+pl+videoHtml});
    if(listHtml) stages.push({kicker:'Points clés', heading:'Ce qu\'il faut retenir', body:listHtml});
    var total=stages.length;

    var dots=stages.map(function(_,k){return '<div class="lstep-dot'+(k===0?' active':'')+'" data-k="'+k+'"><div class="fill"></div></div>';}).join('');
    var stageHtml=stages.map(function(st,k){
      return '<div class="lstage'+(k===0?' active':'')+'" data-step="'+k+'">'+
        '<div class="s-kicker">'+(k+1)+' — '+st.kicker+'</div>'+
        '<h2 class="s-h">'+st.heading+'</h2>'+
        '<div class="lbody">'+st.body+'</div></div>';
    }).join('');

    var isLastInd=idx===INDIC.length-1;
    var mount=$('#indicMount');
    mount.innerHTML=
      '<div class="lstepper" id="indStepper">'+dots+'</div>'+
      '<div class="lstep-lbl" id="indStepLbl">Étape 1 sur '+total+'</div>'+
      stageHtml+
      '<div class="lpager">'+
        '<button class="btn btn-ghost" id="indPrev" disabled>← Précédent</button>'+
        '<span class="pcount" id="indPcount">1 / '+total+'</span>'+
        '<button class="btn btn-primary" id="indNext">Suivant →</button>'+
      '</div>';

    var cur=0, vcBooted=false;
    function showStep(n){
      cur=Math.max(0,Math.min(total-1,n));
      mount.querySelectorAll('.lstage').forEach(function(st){st.classList.toggle('active',+st.dataset.step===cur);});
      mount.querySelectorAll('.lstep-dot').forEach(function(dd,di){dd.classList.toggle('active',di===cur);dd.classList.toggle('done',di<cur);});
      $('#indStepLbl').textContent='Étape '+(cur+1)+' sur '+total;
      $('#indPcount').textContent=(cur+1)+' / '+total;
      $('#indPrev').disabled=(cur===0);
      var nx=$('#indNext');
      if(cur===total-1){
        // last sub-step: offer next indicator, or finish
        if(!isLastInd){ nx.textContent='Indicateur suivant →'; nx.dataset.role='nextind'; }
        else { nx.style.display='none'; }
      } else { nx.textContent='Suivant →'; nx.dataset.role='step'; nx.style.display='inline-block'; }
      if(!vcBooted && cur===1){ bootVCharts(); vcBooted=true; }
      window.scrollTo({top:0,behavior:'smooth'});
    }
    $('#indNext').addEventListener('click',function(){
      if(this.dataset.role==='nextind'){ selectInd(idx+1); }
      else showStep(cur+1);
    });
    $('#indPrev').addEventListener('click',function(){showStep(cur-1);});
    mount.querySelectorAll('.lstep-dot').forEach(function(dd){dd.addEventListener('click',function(){showStep(+dd.dataset.k);});});
  }

  function selectInd(idx){
    active=idx;
    document.querySelectorAll('#indicSel button').forEach(function(b){b.classList.toggle('on',+b.dataset.ind===idx);});
    renderOne(idx);
    window.scrollTo({top:0,behavior:'smooth'});
  }

  document.querySelectorAll('#indicSel button').forEach(function(b){
    b.addEventListener('click',function(){selectInd(+b.dataset.ind);});
  });

  selectInd(0);
  bindLearnToggle();
  renderNav(); renderTabs(); window.scrollTo(0,0);
}

  function fmt(n){ if(n>=1000)return n.toLocaleString('fr-FR',{maximumFractionDigits:2}); if(n>=1)return n.toFixed(2); return n.toPrecision(5); }

  function evaluate(rows,c){
    var closes=rows.map(function(k){return parseFloat(k[4]);});
    var highs=rows.map(function(k){return parseFloat(k[2]);});
    var lows=rows.map(function(k){return parseFloat(k[3]);});
    var opens=rows.map(function(k){return parseFloat(k[1]);});
    var vols=rows.map(function(k){return parseFloat(k[5]);});
    var n=closes.length, last=n-1, prev=n-2;
    var dir=c.dir, R=c.rules, checks=[], passed=[];
    var price=closes[last];
    var anyRule=false;

    if(R.ema){ anyRule=true;
      if(R.emaF>=R.emaS) return {error:'EMA rapide doit &ecirc;tre &lt; EMA lente.'};
      var ef=_EMA(closes,R.emaF), es=_EMA(closes,R.emaS);
      var ok = dir==='long' ? (ef[prev]<=es[prev]&&ef[last]>es[last]) : (ef[prev]>=es[prev]&&ef[last]<es[last]);
      checks.push({n:'Croisement EMA'+R.emaF+'/'+R.emaS,ok:ok}); if(ok)passed.push('croisement EMA');
    }
    if(R.trend){ anyRule=true;
      var et=_EMA(closes,R.trendP);
      var ok = dir==='long' ? price>et[last] : price<et[last];
      checks.push({n:'Prix '+(dir==='long'?'au-dessus':'sous')+' EMA'+R.trendP,ok:ok}); if(ok)passed.push('tendance OK');
    }
    if(R.rsi){ anyRule=true;
      var rs=_RSI(closes,R.rsiP), rv=rs[last];
      var ok = rv!==null && (dir==='long' ? rv<R.rsiLo : rv>R.rsiHi);
      checks.push({n:'RSI '+(rv!==null?rv.toFixed(0):'-')+(dir==='long'?' < '+R.rsiLo:' > '+R.rsiHi),ok:ok}); if(ok)passed.push('RSI '+rv.toFixed(0));
    }
    if(R.brk){ anyRule=true;
      var from=Math.max(0,last-R.brkN), seg=rows.slice(from,last);
      var hh=Math.max.apply(null,seg.map(function(k){return parseFloat(k[2]);}));
      var ll=Math.min.apply(null,seg.map(function(k){return parseFloat(k[3]);}));
      var ok = dir==='long' ? price>hh : price<ll;
      checks.push({n:'Cassure '+(dir==='long'?'plus haut':'plus bas')+' '+R.brkN+' bougies',ok:ok}); if(ok)passed.push('cassure');
    }
    if(R.pb){ anyRule=true;
      var ep=_EMA(closes,R.pbP), dist=Math.abs(price-ep[last])/ep[last]*100;
      var ok=dist<=R.pbD;
      checks.push({n:'Pullback &le; '+R.pbD+'% de EMA'+R.pbP+' ('+dist.toFixed(2)+'%)',ok:ok}); if(ok)passed.push('pullback');
    }
    if(R.vol){ anyRule=true;
      var from2=Math.max(0,last-R.volN), vseg=vols.slice(from2,last);
      var avg=vseg.reduce(function(a,b){return a+b;},0)/Math.max(1,vseg.length);
      var ok=vols[last]>=avg*R.volM;
      checks.push({n:'Volume &ge; '+R.volM+'&times; moyenne',ok:ok}); if(ok)passed.push('volume');
    }
    if(R.mom){ anyRule=true;
      var body=Math.abs(closes[last]-opens[last]), range=highs[last]-lows[last];
      var bodyPct=range>0?body/range*100:0;
      var rightWay = dir==='long' ? closes[last]>opens[last] : closes[last]<opens[last];
      var ok = rightWay && bodyPct>=R.momP;
      checks.push({n:'Bougie momentum (corps '+bodyPct.toFixed(0)+'%)',ok:ok}); if(ok)passed.push('momentum');
    }

    if(!anyRule) return {none:true, price:price};
    var allOk = checks.every(function(c){return c.ok;});
    if(!allOk) return {signal:null, price:price, checks:checks};

    var entry=price, sl,tp;
    if(dir==='long'){ sl=entry*(1-c.sl/100); tp=entry*(1+c.tp/100); }
    else { sl=entry*(1+c.sl/100); tp=entry*(1-c.tp/100); }
    return {signal:dir, price:price, entry:entry, sl:sl, tp:tp, rr:c.tp/c.sl, checks:checks, reason:passed.join(' + ')};
  }

      +'  </div>'
      +checksHtml(res.checks)

  function scan(){
    var c=cfg();

        if(st)st.textContent='Erreur';
      });
  }

  function start(){ scanning=true; $('#sgToggle').textContent='Arr&ecirc;ter le scan'; $('#sgToggle').classList.remove('btn-primary'); $('#sgStatus').textContent='Scan actif (toutes les 30s)'; scan(); timer=setInterval(scan,30000); }
  function stop(){ scanning=false; if(timer)clearInterval(timer);timer=null; $('#sgToggle').textContent='D&eacute;marrer le scan'; $('#sgToggle').classList.add('btn-primary'); $('#sgStatus').textContent='Arr&ecirc;t&eacute;'; }
